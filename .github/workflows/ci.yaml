name: CI

on:
  workflow_dispatch:

jobs:
  build-staging:
    uses: ./.github/workflows/reusable-build.yaml
    with:
      environment: staging

  build-production:
    uses: ./.github/workflows/reusable-build.yaml
    with:
      environment: production

  summary:
    runs-on: ubuntu-latest
    needs: [build-staging, build-production]
    steps:
      - run: |
          echo "Staging artifact:    ${{ needs.build-staging.outputs.artifact-name }}"
          echo "Production artifact: ${{ needs.build-production.outputs.artifact-name }}"
